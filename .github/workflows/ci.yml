name: CI Pipeline

on:
  push:
    branches: [ main, refactor-architecture-test-suite ]
  pull_request:
    branches: [ main, refactor-architecture-test-suite ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run code formatting check (Black)
      run: black --check .

    - name: Run import sort check (Isort)
      run: isort --check-only --diff --profile black .

    - name: Run syntax and style check (Flake8)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run tests with coverage
      env:
        PYTHONPATH: .
      run: |
        pytest --cov=routes --cov=services --cov=utils --cov=app --cov-report=term-missing tests/
